name: Auto Deploy to MonsterASP

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore backend/TicketBookingSystem.Api/TicketBookingSystem.Api.csproj

    - name: Build and Publish
      run: dotnet publish backend/TicketBookingSystem.Api/TicketBookingSystem.Api.csproj -c Release -o ./output

    - name: Deploy to MonsterASP via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: site64196.siteasp.net
        username: site64196
        password: ${{ secrets.MONSTER_FTP_PASSWORD }}
        local-dir: ./output/
        server-dir: /wwwroot/
        protocol: ftp
        port: 21
